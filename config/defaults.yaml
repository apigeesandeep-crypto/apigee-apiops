# ─────────────────────────────────────────────────────────────────────
# Apigee X — Master Build Configuration
# ─────────────────────────────────────────────────────────────────────
org: "apigee-eval-project-502309"
env: "eval"

# ── Shared Flows ────────────────────────────────────────────────────
shared_flows:
  - name: sf-security
    description: "Common security: OAuth verify + threat protection"
    policies:
      - type: oauth-verify
      - type: json-threat
      - type: regex-threat

  - name: sf-cors
    description: "CORS preflight + response headers"
    policies:
      - type: cors-preflight
      - type: cors-headers

  - name: sf-logging
    description: "Request/response message logging"
    policies:
      - type: message-logging
        log_to: stackdriver

# ── API Proxies ─────────────────────────────────────────────────────
api_proxies:
  - name: petstore-api
    display_name: "Petstore API"
    base_path: /petstore/v1
    target_url: https://petstore3.swagger.io/api/v3
    description: "Petstore sample API"
    virtual_host: default

    policies:
      quota:
        allow_count: 100
        interval: 1
        time_unit: minute
      spike_arrest:
        rate: 30ps            # 30 per second
      oauth: true             # attach OAuth verification
      cors: true              # attach CORS shared flow
      security_flow: true     # attach security shared flow
      remove_auth_header: true
      threat_protection: true

    fault_rules:
      - name: InvalidApiKey
        condition: "fault.name = \"InvalidApiKey\" OR fault.name = \"FailedToResolveAPIKey\""
        status_code: 401
        reason: Unauthorized
        message: "Invalid or missing API key"
      - name: QuotaViolation
        condition: "fault.name = \"QuotaViolation\""
        status_code: 429
        reason: TooManyRequests
        message: "Rate limit exceeded. Try again later."
      - name: ThreatDetected
        condition: "fault.name = \"ThreatDetected\""
        status_code: 400
        reason: BadRequest
        message: "Request blocked due to content policy violation"

  - name: weather-api
    display_name: "Weather API"
    base_path: /weather/v1
    target_url: https://api.open-meteo.com/v1
    description: "Open-Meteo weather data"

    policies:
      quota:
        allow_count: 200
        interval: 1
        time_unit: minute
      spike_arrest:
        rate: 50ps
      oauth: true
      cors: true
      security_flow: true
      remove_auth_header: true
      threat_protection: false

    fault_rules:
      - name: InvalidApiKey
        condition: "fault.name = \"InvalidApiKey\" OR fault.name = \"FailedToResolveAPIKey\""
        status_code: 401
        reason: Unauthorized
        message: "Invalid or missing API key"
      - name: QuotaViolation
        condition: "fault.name = \"QuotaViolation\""
        status_code: 429
        reason: TooManyRequests
        message: "Rate limit exceeded"

# ── API Products ────────────────────────────────────────────────────
api_products:
  - name: petstore-product
    display_name: "Petstore Product"
    description: "Access to Petstore API — 100 req/min"
    approval_type: auto
    access: public
    environments: [eval]
    proxies: [petstore-api]
    quota: 100
    quota_interval: 1
    quota_time_unit: minute
    scopes: [read, write]

  - name: weather-product
    display_name: "Weather Product"
    description: "Access to Weather API — 200 req/min"
    approval_type: auto
    access: public
    environments: [eval]
    proxies: [weather-api]
    quota: 200
    quota_interval: 1
    quota_time_unit: minute
    scopes: [read]

# ── Developers ──────────────────────────────────────────────────────
developers:
  - email: hampianjanadri@gmail.com
    first_name: Dev
    last_name: User
    username: devuser

# ── Apps ────────────────────────────────────────────────────────────
apps:
  - name: petstore-app
    display_name: "Petstore App"
    developer_email: hampianjanadri@gmail.com
    api_products: [petstore-product]
    callback_url: "https://example.com/oauth/callback"

  - name: weather-app
    display_name: "Weather App"
    developer_email: hampianjanadri@gmail.com
    api_products: [weather-product]
    callback_url: "https://example.com/oauth/callback"

# ── Defaults ────────────────────────────────────────────────────────
default_shared_flows:
  security: sf-security
  cors: sf-cors
  logging: sf-logging
