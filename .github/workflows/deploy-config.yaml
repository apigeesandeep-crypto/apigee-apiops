# ──────────────────────────────────────────────────────────────
# CI/CD pipeline for Apigee Config (API Products, Developers, Apps)
# Plugin : com.apigee.edge.config:apigee-config-maven-plugin:2.7.1
#
# Required GitHub Secrets:
#   APIGEE_ORG                – GCP project ID
#   APIGEE_ENV                – Target environment (e.g. eval)
#   WORKLOAD_IDENTITY_PROVIDER – Full WIF provider resource string
#   SERVICE_ACCOUNT_EMAIL      – SA email for keyless auth
# ──────────────────────────────────────────────────────────────

name: Deploy Config (Products, Developers, Apps)

on:
  push:
    branches:
      - main
    paths:
      - 'edge.json'
    workkflow_dispatch:

jobs:
  deploy:
    name: Deploy API Products, Developers & Apps
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # ── Keyless GCP auth via WIF ───────────────────────────
      - name: Authenticate to GCP via Workload Identity Federation
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token

      # ── Java 11 ────────────────────────────────────────────
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      # ── Maven cache ────────────────────────────────────────
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── Maven deploy config ────────────────────────────────
      - name: Deploy API Products, Developers, Apps
        env:
          APIGEE_ORG: ${{ secrets.APIGEE_ORG }}
          APIGEE_ENV: ${{ secrets.APIGEE_ENV }}
          APIGEE_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "==> Deploying config (products, developers, apps) …"
          echo "  Org : $APIGEE_ORG"
          echo "  Env : $APIGEE_ENV"
          echo ""

          mvn install \
            -P"${APIGEE_ENV}" \
            -Dorg="${APIGEE_ORG}" \
            -Denv="${APIGEE_ENV}" \
            -Dbearer="${APIGEE_TOKEN}" \
            -Dapigee.config.options=update \
            -Dapigee.config.dir=. \
            --no-transfer-progress \
            --batch-mode \
            -f pom.xml

          echo "==> Config deploy complete."

      # ── Summary ────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "──────────────────────────────────────"
          echo "  Config      : edge.json"
          echo "  Org         : ${{ secrets.APIGEE_ORG }}"
          echo "  Environment : ${{ secrets.APIGEE_ENV }}"
          echo "  Plugin      : apigee-config-maven-plugin 2.7.1"
          echo "  Auth        : WIF keyless (bearer token)"
          echo "  Triggered by: ${{ github.actor }}"
          echo "  Branch      : ${{ github.ref_name }}"
          echo "  Commit SHA  : ${{ github.sha }}"
          echo "──────────────────────────────────────"
