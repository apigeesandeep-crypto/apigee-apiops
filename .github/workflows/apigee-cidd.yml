name: Apigee CI/CD

on:
  push:
    branches: [main]
    paths:
      - "apiproxies/**"
      - "sharedflows/**"
      - "edge.json"
      - "pom.xml"
  pull_request:
    branches: [main]

env:
  APIGEE_ORG: ${{ vars.APIGEE_ORG }}
  APIGEE_ENV: ${{ vars.APIGEE_ENV || 'eval' }}
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
  SA_EMAIL: ${{ vars.SA_EMAIL }}

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g apigeelint
      - name: Lint all bundles
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem apiproxies -Directory | ForEach-Object {
            Write-Host "=== $($_.Name) ==="
            apigeelint -s "$($_.FullName)/apiproxy" -f table.js --profile apigeex
            if ($LASTEXITCODE -ne 0) { $failed = $true }
          }
          Get-ChildItem sharedflows -Directory | ForEach-Object {
            Write-Host "=== $($_.Name) ==="
            apigeelint -s "$($_.FullName)/sharedflowbundle" -f table.js --profile apigeex
            if ($LASTEXITCODE -ne 0) { $failed = $true }
          }
          if ($failed) { exit 1 }

  deploy:
    needs: lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}
          token_format: access_token

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 11 }

      - name: Deploy all
        shell: pwsh
        env:
          APIGEE_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          $token = $env:APIGEE_TOKEN

          # 1. Shared Flows first
          Get-ChildItem sharedflows -Directory | ForEach-Object {
            Write-Host "Deploying SharedFlow: $($_.Name)"
            Push-Location $_.FullName
            mvn clean install -Peval `
              "-Dapigee.org=$env:APIGEE_ORG" `
              "-Dapigee.env=$env:APIGEE_ENV" `
              "-Dapigee.bearer=$token" `
              "-Dapigee.apitype=sharedflow" `
              "-Dapigee.options=override" `
              "-Dapigee.proxy.basedir=$PWD" `
              -f ../../pom.xml
            Pop-Location
          }

          # 2. API Proxies
          Get-ChildItem apiproxies -Directory | ForEach-Object {
            Write-Host "Deploying Proxy: $($_.Name)"
            Push-Location $_.FullName
            mvn clean install -Peval `
              "-Dapigee.org=$env:APIGEE_ORG" `
              "-Dapigee.env=$env:APIGEE_ENV" `
              "-Dapigee.bearer=$token" `
              "-Dapigee.apitype=configbundle" `
              "-Dapigee.options=override" `
              "-Dapigee.proxy.basedir=$PWD" `
              -f ../../pom.xml
            Pop-Location
          }

          # 3. Config (products, developers, apps)
          mvn clean install -Peval `
            "-Dapigee.org=$env:APIGEE_ORG" `
            "-Dapigee.env=$env:APIGEE_ENV" `
            "-Dapigee.bearer=$token" `
            "-Dapigee.config.options=update" `
            "-Dapigee.config.dir=." `
            -f pom.xml