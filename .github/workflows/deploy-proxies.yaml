# ──────────────────────────────────────────────────────────────
# CI/CD pipeline for Apigee API Proxies
# Plugin : io.apigee.build-tools.enterprise4g:apigee-edge-maven-plugin:2.5.2
#
# Required GitHub Secrets:
#   APIGEE_ORG                – GCP project ID
#   APIGEE_ENV                – Target environment (e.g. eval)
#   WORKLOAD_IDENTITY_PROVIDER – Full WIF provider resource string
#   SERVICE_ACCOUNT_EMAIL      – SA email for keyless auth
# ──────────────────────────────────────────────────────────────

name: Deploy API Proxies

on:
  push:
    branches:
      - main
    paths:
      - 'apiproxies/**'
      - 'pom.xml'

jobs:
  # ── JOB 1 — Detect Changed Proxies ────────────────────────
  detect:
    name: 1 · Detect changed proxies
    runs-on: ubuntu-latest
    outputs:
      proxies: ${{ steps.find.outputs.proxies }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed proxies
        id: find
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- apiproxies/ \
            | cut -d'/' -f2 | sort -u \
            | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "proxies=$CHANGED" >> $GITHUB_OUTPUT
          echo ""
          echo "==> Changed proxies: $CHANGED"

  # ── JOB 2 — Lint ──────────────────────────────────────────
  lint:
    name: 2 · Apigee Lint Checks
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.proxies != '[]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install apigeelint
        run: npm install -g apigeelint

      - name: Run apigeelint on proxies
        run: |
          EXIT=0
          for dir in apiproxies/*/apiproxy; do
            PROXY_NAME=$(basename $(dirname "$dir"))
            echo "=== $PROXY_NAME ==="
            apigeelint \
              -s "$dir" \
              -f table.js \
              --profile apigee \
              --maxWarnings 10 || EXIT=1
          done
          exit $EXIT

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: apiproxies/
          retention-days: 7

  # ── JOB 3 — Maven Deploy ──────────────────────────────────
  maven-deploy:
    name: 3 · Maven Build & Deploy to Apigee
    runs-on: ubuntu-latest
    needs: lint

    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        proxy: ${{ fromJson(needs.detect.outputs.proxies) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # ── Keyless GCP auth via WIF ───────────────────────────
      - name: Authenticate to GCP via Workload Identity Federation
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token

      # ── Java 11 ────────────────────────────────────────────
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      # ── Maven cache ────────────────────────────────────────
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── Maven deploy ───────────────────────────────────────
      - name: Run Maven deploy via apigee-edge-maven-plugin
        env:
          APIGEE_ORG: ${{ secrets.APIGEE_ORG }}
          APIGEE_ENV: ${{ secrets.APIGEE_ENV }}
          APIGEE_TOKEN: ${{ steps.auth.outputs.access_token }}
        working-directory: apiproxies/${{ matrix.proxy }}
        run: |
          echo "==> Starting Maven deploy …"
          echo "  Org     : $APIGEE_ORG"
          echo "  Env     : $APIGEE_ENV"
          echo "  Profile : $APIGEE_ENV"
          echo "  Proxy   : ${{ matrix.proxy }}"
          echo ""

          mvn install \
            -P"${APIGEE_ENV}" \
            -Dorg="${APIGEE_ORG}" \
            -Denv="${APIGEE_ENV}" \
            -Dbearer="${APIGEE_TOKEN}" \
            --no-transfer-progress \
            --batch-mode \
            -f ../../pom.xml

          echo "==> Maven deploy complete."

      # ── Summary ────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "──────────────────────────────────────"
          echo "  Proxy       : ${{ matrix.proxy }}"
          echo "  Org         : ${{ secrets.APIGEE_ORG }}"
          echo "  Environment : ${{ secrets.APIGEE_ENV }}"
          echo "  Plugin      : apigee-edge-maven-plugin 2.5.2"
          echo "  Auth        : WIF keyless (bearer token)"
          echo "  Triggered by: ${{ github.actor }}"
          echo "  Branch      : ${{ github.ref_name }}"
          echo "  Commit SHA  : ${{ github.sha }}"
          echo "──────────────────────────────────────"
